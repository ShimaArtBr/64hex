<style>
/* ═══════════════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════════════ */
:root {
  /* ── DS v2.5 "Quiet Luxury Tupiniquim" ─────────────────────────── */

  /* Tipografia */
  --ff:  'Lora', 'Noto Serif SC', serif;
  --fd2: 'Noto Sans', system-ui, sans-serif;
  --fm2: 'JetBrains Mono', monospace;
  --fc:  'Noto Serif SC', serif;

  /* Escala tipográfica — razão 1.333 */
  --text-ctx:    0.563rem;   /*  9px — micro labels */
  --text-label:  0.750rem;   /* 12px — labels, meta */
  --text-pinyin: 0.6875rem;  /* 11px — pinyin, coords */
  --text-base:   1.000rem;   /* 16px — corpo */
  --text-dest:   1.333rem;   /* 21px — destaques */
  --text-cjk:    1.776rem;   /* 28px — hanzi display */
  --text-glyph:  3.157rem;   /* 50px — glifo principal */

  /* Espaçamento — base 8px */
  --s1: 8px;  --s2: 16px;  --s3: 24px;  --s4: 32px;
  --s5: 40px; --s6: 48px;  --s8: 64px;  --s10: 80px;

  /* Border-radius */
  --radius-sm:   4px;
  --radius-md:   8px;
  --radius-lg:   12px;
  --radius-full: 9999px;

  /* Motion */
  --t-fast: 150ms;
  --t-base: 250ms;
  --ease:   cubic-bezier(.4,0,.2,1);

  /* Transição de tema */
  --transition-theme: background var(--t-base), color var(--t-base), border-color var(--t-base);

  /* Cor semântica — linhas móveis (extensão DS para I Ching) */
  --lacquer:  #8B1A1A;
  --lacquer2: #C43030;
}

/* ── DARK MODE — DS v2.5 canônico ──────────────────────────────── */
[data-theme="dark"] {
  /* Superfícies */
  --sp: #0F0E0A;
  --sc: #1A1914;
  --si: #222018;

  /* Tinta */
  --ip: #F2EEE4;
  --is: #C4BAA6;
  --im: #867C6A;
  --id: #524C40;

  /* Dourado */
  --gold:  #C09A4A;
  --gl:    #D4B060;
  --gs:    rgba(192, 154, 74, 0.08);
  --gb:    rgba(192, 154, 74, 0.20);

  /* Aliases semânticos para compatibilidade interna */
  --bg:       var(--sp);
  --surface:  var(--sc);
  --panel:    var(--si);
  --panel2:   #2A2820;
  --text:     var(--ip);
  --muted:    var(--is);
  --dim:      var(--im);
  --ink:      var(--gold);
  --bg-gold:  var(--gs);
  --input-bg: var(--si);
  --input-bd: var(--gb);
  --shadow:   rgba(0, 0, 0, .50);
}

/* ── LIGHT MODE — DS v2.5 canônico ─────────────────────────────── */
[data-theme="light"] {
  /* Superfícies */
  --sp: #F6F3ED;
  --sc: #FDFCF9;
  --si: #EDE9E0;

  /* Tinta */
  --ip: #1E1B15;
  --is: #4C4538;
  --im: #7C7264;
  --id: #ACA090;

  /* Dourado */
  --gold:  #967438;
  --gl:    #B8924C;
  --gs:    rgba(150, 116, 56, 0.08);
  --gb:    rgba(150, 116, 56, 0.20);

  /* Aliases semânticos */
  --bg:       var(--sp);
  --surface:  var(--sc);
  --panel:    var(--sc);
  --panel2:   var(--si);
  --text:     var(--ip);
  --muted:    var(--is);
  --dim:      var(--im);
  --ink:      var(--gl);
  --bg-gold:  var(--gs);
  --input-bg: var(--sc);
  --input-bd: var(--gb);
  --shadow:   var(--shadow);
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

/* Focus visible global — acessibilidade WCAG 2.2 */
:focus-visible {
  outline: 2px solid var(--gold);
  outline-offset: 2px;
  border-radius: var(--radius-sm);
}

html { font-size: 16px; scroll-behavior: smooth; }

body {
  font-family: var(--fd2);
  font-weight: 300;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.7;
  transition: var(--transition-theme);
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  opacity: .035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 256px 256px;
}

/* REGRA CARDINAL: nenhum texto em bold */
strong, b, h1, h2, h3, h4, h5, h6 { font-weight: 400; }

/* ═══════════════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════════════ */
.topbar {
  background: color-mix(in srgb, var(--sp) 88%, transparent);
  border-bottom: 1px solid var(--bg-gold);
  padding: 0 22px;
  height: 54px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 16px var(--shadow);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  transition: var(--transition-theme);
}
[data-theme="light"] .topbar {
  background: color-mix(in srgb, var(--sp) 90%, transparent);
}

.topbar-inner {
  max-width: 1080px;
  margin: 0 auto;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.topbar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  flex-shrink: 0;
}

.brand-mark {
  width: 32px;
  height: 32px;
  border: 1.5px solid var(--gold);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--text-base);
  color: var(--gold);
  font-family: var(--ff);
  flex-shrink: 0;
}

.brand-name {
  font-family: var(--ff);
  font-size: var(--text-base);
  color: var(--gold);
  letter-spacing: .12em;
  text-transform: uppercase;
}

.brand-sub {
  font-size: var(--text-pinyin);
  color: var(--muted);
  letter-spacing: .06em;
  font-family: var(--fd2);
}

.topbar-right { display: flex; align-items: center; gap: 9px; }

.topbar-badge {
  background: var(--gs);
  border: 1px solid color-mix(in srgb, var(--gold) 25%, transparent);
  border-radius: var(--radius-full);
  padding: 2px 9px;
  font-size: var(--text-ctx);
  color: var(--gold-dim);
  letter-spacing: .12em;
  text-transform: uppercase;
  font-family: var(--fm2);
}

/* ── Lang dropdown ── */
.lang-wrap { position: relative; }

.lang-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--panel);
  border: 1px solid var(--bg-gold);
  border-radius: var(--radius-md);
  padding: 0 12px;
  height: 44px;
  cursor: pointer;
  color: var(--text);
  font-size: var(--text-label);
  font-family: var(--fd2);
  transition: border-color var(--t-base);
}
.lang-btn:hover, .lang-btn:focus-visible { border-color: var(--gold); outline: none; }

.lang-arrow {
  font-size: var(--text-ctx);
  color: var(--muted);
  transition: transform var(--t-base);
}
.lang-wrap.open .lang-arrow { transform: rotate(180deg); }

.lang-menu {
  display: none;
  position: absolute;
  top: calc(100% + 5px);
  right: 0;
  background: var(--panel);
  border: 1px solid var(--bg-gold);
  border-radius: var(--radius-md);
  min-width: 145px;
  box-shadow: 0 8px 24px var(--shadow);
  z-index: 200;
  overflow: hidden;
}
.lang-wrap.open .lang-menu { display: block; }

.lang-opt {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 12px;
  font-size: var(--text-label);
  color: var(--text);
  cursor: pointer;
  transition: background var(--t-fast);
  border: none;
  background: transparent;
  width: 100%;
  text-align: left;
  font-family: var(--fd2);
}
.lang-opt:hover { background: var(--gs); color: var(--gold2); }
.lang-opt.active { color: var(--gold); }

/* ── Theme button ── */
.theme-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 44px;
  background: var(--panel);
  border: 1px solid var(--bg-gold);
  border-radius: var(--radius-md);
  cursor: pointer;
  font-size: var(--text-base);
  transition: border-color var(--t-base);
}
.theme-btn:hover { border-color: var(--gold); }

/* ═══════════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════════ */
.page {
  max-width: 1080px;
  margin: 0 auto;
  padding: 28px 22px 80px;
  display: grid;
  grid-template-columns: 310px 1fr;
  gap: 24px;
  align-items: start;
}

@media (max-width: 780px) {
  .page { grid-template-columns: 1fr; padding: 16px 14px 56px; }
}

/* ═══════════════════════════════════════════════════
   INPUT PANEL
═══════════════════════════════════════════════════ */
.input-panel {
  background: var(--panel);
  border: 1px solid var(--bg-gold);
  border-radius: var(--radius-lg);
  padding: 22px;
  position: sticky;
  top: 68px;
  box-shadow: 0 4px 18px var(--shadow);
  transition: var(--transition-theme);
}

.panel-title {
  font-family: var(--ff);
  font-size: var(--text-base);
  font-weight: 400;
  color: var(--gold);
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid transparent;
  border-image: linear-gradient(to right, color-mix(in srgb, var(--gold) 50%, transparent), var(--gs)) 1;
  display: flex;
  align-items: center;
  gap: 9px;
}
.panel-title-zh { font-size: var(--text-base); opacity: .65; }

.field-group { margin-bottom: 14px; }

.field-label {
  font-family: var(--fm2);
  font-size: var(--text-ctx);
  color: var(--muted);
  letter-spacing: .09em;
  text-transform: uppercase;
  margin-bottom: 5px;
  display: block;
}

textarea {
  width: 100%;
  background: var(--input-bg);
  border: 1px solid var(--gb);
  border-radius: var(--radius-md);
  color: var(--text);
  font-family: var(--fd2);
  font-size: var(--text-label);
  font-weight: 300;
  padding: 10px 14px;
  outline: none;
  resize: none;
  transition: border-color .2s, background .25s, color .25s;
  line-height: 1.65;
}
textarea:focus { border-color: color-mix(in srgb, var(--gold) 35%, transparent); }
textarea::placeholder { color: var(--dim); font-style: italic; }

/* ── Method tabs ── */
.method-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 8px;
}
.method-tab {
  flex: 1;
  padding: 8px 6px;
  border: 1px solid var(--gb);
  border-radius: var(--radius-md);
  background: transparent;
  color: var(--muted);
  font-size: var(--text-ctx);
  cursor: pointer;
  text-align: center;
  transition: all .2s;
  font-family: var(--fm2);
  letter-spacing: .12em;
  text-transform: uppercase;
}
.method-tab:hover { border-color: var(--gold); color: var(--text); }
.method-tab.active {
  border-color: var(--gold);
  background: var(--gs);
  color: var(--gold2);
}
.method-desc {
  font-size: var(--text-pinyin);
  color: var(--dim);
  line-height: 1.6;
  min-height: 2rem;
  font-family: var(--fd2);
  font-weight: 300;
}

/* ── Consult button ── */
.consult-btn {
  width: 100%;
  margin-top: 18px;
  padding: 14px;
  border-radius: var(--radius-md);
  background: var(--gold);
  border: 1px solid var(--gold);
  color: var(--bg);
  font-family: var(--fm2);
  font-size: var(--text-ctx);
  font-weight: 400;
  cursor: pointer;
  transition: background var(--t-base), transform var(--t-fast), opacity var(--t-base), border-color var(--t-base);
  letter-spacing: .12em;
  text-transform: uppercase;
  position: relative;
  overflow: hidden;
}
.consult-btn:hover:not(:disabled) { background: var(--gold2); border-color: var(--gold2); }
.consult-btn:active:not(:disabled) { transform: scale(.98); }
.consult-btn:disabled { opacity: .55; cursor: not-allowed; }

/* ── Coin stage ── */
.coin-stage {
  margin-top: 14px;
  background: var(--panel2);
  border: 1px solid var(--bg-gold);
  border-radius: var(--radius-md);
  padding: 10px 12px;
  display: none;
}
.coin-stage.visible { display: block; }

.coin-row {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin: 3px 0;
}

.line-result-row {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 3px 0;
}

.line-num {
  color: var(--dim);
  font-family: var(--fm2);
  font-size: var(--text-label);
  width: 12px;
  text-align: right;
  flex-shrink: 0;
}

.coin {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--gold);
  font-size: var(--text-label);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--gold);
  font-family: var(--fm2);
  opacity: 0;
  transform: scale(.5) rotate(-90deg);
  transition: opacity var(--t-base), transform var(--t-base);
}
.coin.visible {
  opacity: 1;
  transform: scale(1) rotate(0deg);
}
.coin.heads { background: color-mix(in srgb, var(--gold) 18%, transparent); }
.coin.tails { background: color-mix(in srgb, var(--dim) 15%, transparent); color: var(--muted); border-color: var(--dim); }

.line-glyph {
  font-size: var(--text-cjk);
  line-height: 1;
  color: var(--gold);
  width: 26px;
  text-align: center;
  flex-shrink: 0;
  opacity: 0;
  transition: opacity var(--t-base);
  letter-spacing: -1px;
}
.line-glyph.visible { opacity: 1; }
.line-glyph.moving  { color: var(--lacquer2); }

.line-sum {
  font-family: var(--fm2);
  color: var(--muted);
  font-size: var(--text-label);
  opacity: 0;
  transition: opacity var(--t-base);
  flex-shrink: 0;
  width: 10px;
}
.line-sum.visible { opacity: 1; }
.line-sum.moving  { color: var(--lacquer2); }

/* ═══════════════════════════════════════════════════
   CORPUS LOADING STATE
═══════════════════════════════════════════════════ */
.corpus-loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 340px;
  gap: 16px;
  opacity: .6;
}
.loading-sym {
  font-size: var(--text-glyph);
  color: var(--gold);
  animation: spinSlow 3s linear infinite;
}
@keyframes spinSlow {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
.loading-txt {
  font-size: var(--text-label);
  color: var(--muted);
  font-family: var(--fm2);
  letter-spacing: .06em;
}
.corpus-error {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 200px;
  gap: 10px;
  color: var(--red2);
  font-size: var(--text-label);
  text-align: center;
  padding: 20px;
}

/* ═══════════════════════════════════════════════════
   EMPTY STATE
═══════════════════════════════════════════════════ */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 380px;
  gap: 18px;
  opacity: .4;
  transition: opacity var(--t-base);
}
.empty-sym {
  font-size: var(--text-glyph);
  line-height: 1;
  color: var(--gold);
  font-family: var(--ff);
}
.empty-txt {
  font-family: var(--ff);
  font-size: var(--text-label);
  color: var(--muted);
  text-align: center;
  line-height: 1.8;
}

/* ═══════════════════════════════════════════════════
   HEX CARD
═══════════════════════════════════════════════════ */
.hex-card {
  background: var(--panel);
  border: 1px solid var(--bg-gold);
  border-radius: var(--radius-lg);
  padding: 26px 26px 22px;
  box-shadow: 0 4px 20px var(--shadow);
  transition: var(--transition-theme);
}

.hex-card-reveal {
  animation: fadeUp .45s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: none; }
}

/* ── Hex header ── */
.hex-header {
  display: flex;
  align-items: flex-start;
  gap: 20px;
  margin-bottom: 20px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--bg-gold);
}

.hex-sym {
  font-size: var(--text-glyph);
  line-height: 1;
  color: var(--gold);
  font-family: var(--ff);
  flex-shrink: 0;
  /* Ritual reveal animation */
  opacity: 0;
  transform: scale(.7);
  transition: opacity .6s cubic-bezier(.22,1,.36,1), transform .6s cubic-bezier(.22,1,.36,1);
}
.hex-sym.revealed { opacity: 1; transform: scale(1); }

.hex-meta {}

.hex-num {
  font-size: var(--text-label);
  color: var(--muted);
  letter-spacing: .1em;
  text-transform: uppercase;
  font-family: var(--fm2);
}
.hex-name-zh {
  font-size: var(--text-dest);
  color: var(--gold2);
  font-family: var(--ff);
  line-height: 1.2;
  margin-top: 2px;
}
.hex-name-py {
  font-size: var(--text-label);
  color: var(--muted);
  margin-top: 2px;
  font-style: italic;
}
.hex-name-tr {
  font-size: var(--text-base);
  color: var(--text);
  font-family: var(--ff);
  margin-top: 6px;
}
.hex-keywords {
  font-size: var(--text-label);
  color: var(--dim);
  margin-top: 6px;
  font-family: var(--fm2);
  letter-spacing: .04em;
}

@media (max-width: 780px) {
  .hex-header { flex-direction: column; gap: 10px; }
  .hex-sym { font-size: var(--text-glyph); }
}

/* ── Trigrams row ── */
.trigrams-row {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.trig-chip {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--gs);
  border: 1px solid color-mix(in srgb, var(--gold) 20%, transparent);
  border-radius: var(--radius-full);
  padding: 3px 10px 3px 7px;
  font-size: var(--text-label);
}
.trig-pos { color: var(--dim); font-size: var(--text-pinyin); font-family: var(--fm2); letter-spacing: .04em; }
.trig-sym { font-size: var(--text-base); color: var(--lacquer2); }
.trig-name { color: var(--muted); }
.trig-sep { color: var(--dim); font-size: var(--text-ctx); margin: 0 3px; }

/* ── Moving lines alert ── */
.moving-alert {
  background: color-mix(in srgb, var(--lacquer2) 8%, transparent);
  border: 1px solid color-mix(in srgb, var(--lacquer2) 30%, transparent);
  border-radius: var(--radius-md);
  padding: 9px 13px;
  margin-bottom: 14px;
  font-size: var(--text-label);
  color: var(--lacquer2);
  display: flex;
  align-items: flex-start;
  gap: 9px;
  line-height: 1.5;
}
.moving-alert-icon { flex-shrink: 0; margin-top: 1px; }

/* ── Question display ── */
.question-display {
  font-family: var(--ff);
  font-style: italic;
  font-size: var(--text-label);
  color: var(--muted);
  border-left: 2px solid var(--gold);
  padding-left: 12px;
  margin-bottom: 16px;
  opacity: .8;
  line-height: 1.55;
}

/* ═══════════════════════════════════════════════════
   ACCORDION SECTIONS
═══════════════════════════════════════════════════ */
.sections { margin-top: 2px; }

.section {
  border: 1px solid var(--bg-gold);
  border-radius: var(--radius-md);
  margin-bottom: 7px;
  overflow: hidden;
  transition: border-color var(--t-base);
}

/* ════════════════════════════════════════════════
   RANDOM — crypto.getRandomValues
════════════════════════════════════════════════ */
function secureRandInt(max) {
  var arr = new Uint32Array(1);
  crypto.getRandomValues(arr);
  return arr[0] % max;
}

function tossCoin() { return secureRandInt(2) === 0 ? 3 : 2; } // head=3, tail=2

/* ════════════════════════════════════════════════
   LINE LOGIC
════════════════════════════════════════════════ */
function lineValue(sum) {
  // sum: 6=yin moving, 7=yang fixed, 8=yin fixed, 9=yang moving
  if (sum === 6) return { yang: false, moving: true,  glyph: '⚋', sym: '6' };
  if (sum === 7) return { yang: true,  moving: false, glyph: '⚊', sym: '7' };
  if (sum === 8) return { yang: false, moving: false, glyph: '⚋', sym: '8' };
  if (sum === 9) return { yang: true,  moving: true,  glyph: '⚊', sym: '9' };
}

/* ════════════════════════════════════════════════
   KING WEN LOOKUP TABLE
   Derivada diretamente da tabela clássica 8×8.

   Cada trigrama tem uma chave binária:
   key = (topo?1:0)*4 + (meio?1:0)*2 + (base?1:0)
     Ch'ien ☰ 111 → key 7
     Chen   ☳ 001 → key 1
     K'an   ☵ 010 → key 2
     Kên    ☶ 100 → key 4
     K'un   ☷ 000 → key 0
     Sun    ☴ 110 → key 6
     Li     ☲ 101 → key 5
     Tui    ☱ 011 → key 3

   KING_WEN[lower_key][upper_key] = número do hexagrama
════════════════════════════════════════════════ */
var KING_WEN = [
  //upper: 0=K'un 1=Chen 2=K'an 3=Tui 4=Kên 5=Li  6=Sun 7=Ch'ien
  /* lower 0 K'un  */ [ 2,  16,   8,  45,  23,  35,  20,  12],
  /* lower 1 Chen  */ [24,  51,   3,  17,  27,  21,  42,  25],
  /* lower 2 K'an  */ [ 7,  40,  29,  47,   4,  64,  59,   6],
  /* lower 3 Tui   */ [19,  54,  60,  58,  41,  38,  61,  10],
  /* lower 4 Kên   */ [15,  62,  39,  31,  52,  56,  53,  33],
  /* lower 5 Li    */ [36,  55,  63,  49,  22,  30,  37,  13],
  /* lower 6 Sun   */ [46,  32,  48,  28,  18,  50,  57,  44],
  /* lower 7 Ch'ien*/ [11,  34,   5,  43,  26,  14,   9,   1]
];

function trigramKey(b0, b1, b2) {
  // b0=base, b1=meio, b2=topo da linha
  return (b2?1:0)*4 + (b1?1:0)*2 + (b0?1:0);
}

function lookupKingWen(lowerKey, upperKey) {
  return KING_WEN[lowerKey][upperKey];
}

function hexFromLines(lines) {
  // lines[0..2] = A,B,C = trigrama inferior: base=A(0), meio=B(1), topo=C(2)
  // lines[3..5] = D,E,F = trigrama superior: base=D(3), meio=E(4), topo=F(5)
  var lowerKey = trigramKey(lines[0].yang, lines[1].yang, lines[2].yang);
  var upperKey = trigramKey(lines[3].yang, lines[4].yang, lines[5].yang);
  return lookupKingWen(lowerKey, upperKey);
}

function hexMutated(lines, movingLines) {
  // Inverte yin↔yang apenas nas linhas de movingLines
  var mut = lines.map(function(l, i) {
    return { yang: movingLines.indexOf(i) >= 0 ? !l.yang : l.yang };
  });
  var lowerKey = trigramKey(mut[0].yang, mut[1].yang, mut[2].yang);
  var upperKey = trigramKey(mut[3].yang, mut[4].yang, mut[5].yang);
  return lookupKingWen(lowerKey, upperKey);
}

function lookupHex(upper, lower) {
  return CORPUS.lookup[String(upper)][String(lower)];
}

function getHex(n) {
  return CORPUS.hexagrams.find(function(h) { return h.number === n; });
}

function getTrigram(n) {
  return CORPUS.trigrams[String(n)];
}

/* ════════════════════════════════════════════════
   COIN ANIMATION — redesenhado do zero

   ROADMAP:
   1. SORTEIO (feito antes de chamar esta função):
      lines[0]=A, lines[1]=B, lines[2]=C  → trigrama inferior
      lines[3]=D, lines[4]=E, lines[5]=F  → trigrama superior

   2. PRÉ-RENDERIZAÇÃO DO DOM (topo→base):
      F(6), E(5), D(4), C(3), B(2), A(1)
      espelha visualmente o hexagrama ao lado

   3. ANIMAÇÃO (base→topo, ascendente):
      A(1) → B(2) → C(3) → D(4) → E(5) → F(6)
      simula o ritual de construção da base ao topo

   4. DISPLAY ao usuário: A=1, B=2, C=3, D=4, E=5, F=6
════════════════════════════════════════════════ */
function animateCoins(lines, coins, onComplete) {
  var stage = document.getElementById('coinStage');
  stage.classList.add('visible');
  stage.innerHTML = '';

  var COIN_DELAY  = 80;
  var ROW_DELAY   = 240;
  var COIN_SETTLE = 300;

  // Letras internas → índice no array (A=base=idx0 ... F=topo=idx5)
  var LETTERS = ['A','B','C','D','E','F'];

  // Guarda referências DOM por letra para a animação
  var rowRefs = {};

  // ── PASSO 2: Renderiza DOM F→A (topo→base) ──
  ['F','E','D','C','B','A'].forEach(function(letter) {
    var idx      = LETTERS.indexOf(letter); // A→0, B→1 ... F→5
    var lv       = lines[idx];
    var coinSet  = coins[idx];
    var isMoving = lv.moving;
    var display  = idx + 1; // número exibido: A→1 ... F→6

    var row = document.createElement('div');
    row.className = 'line-result-row';

    // Glifo (⚊ yang / ⚋ yin)
    var glyphEl = document.createElement('div');
    glyphEl.className = 'line-glyph' + (isMoving ? ' moving' : '');
    glyphEl.textContent = lv.yang ? '⚊' : '⚋';
    row.appendChild(glyphEl);

    // Número da linha
    var numEl = document.createElement('div');
    numEl.className = 'line-num';
    numEl.textContent = display;
    row.appendChild(numEl);

    // Moedas
    var coinsWrap = document.createElement('div');
    coinsWrap.style.cssText = 'display:flex;gap:4px;flex:1;';
    coinSet.forEach(function(c) {
      var el = document.createElement('div');
      el.className = 'coin ' + (c === 3 ? 'heads' : 'tails');
      el.textContent = c === 3 ? '☯' : '✦';
      coinsWrap.appendChild(el);
    });
    row.appendChild(coinsWrap);

    // Soma
    var sumEl = document.createElement('div');
    sumEl.className = 'line-sum' + (isMoving ? ' moving' : '');
    sumEl.textContent = lv.sym;
    row.appendChild(sumEl);

    stage.appendChild(row);
    rowRefs[letter] = { coins: coinsWrap.children, glyph: glyphEl, sum: sumEl };
  });

  // ── PASSO 3: Anima A→F (base→topo, ascendente) ──
  LETTERS.forEach(function(letter, animPos) {
    var base = animPos * ROW_DELAY;
    var r    = rowRefs[letter];
    Array.from(r.coins).forEach(function(coin, ci) {
      setTimeout(function() { coin.classList.add('visible'); }, base + ci * COIN_DELAY);
    });
    setTimeout(function() {
      r.glyph.classList.add('visible');
      r.sum.classList.add('visible');
    }, base + 3 * COIN_DELAY + COIN_SETTLE);
  });

  var total = 5 * ROW_DELAY + 3 * COIN_DELAY + COIN_SETTLE + 350;
  setTimeout(onComplete, total);
}

/* ════════════════════════════════════════════════
   RENDER HELPERS
════════════════════════════════════════════════ */
function escH(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function buildTextBlock(obj) {
  var html = '';
  var showPt = (LANG === 'pt');
  var showEn = (LANG === 'en');
  var showZh = true; // always show ZH

  // ZH
  if (showZh && obj.zh) {
    html += '<div class="text-block">';
    if (LANG !== 'zh') html += '<div class="text-lang">ZH — 古文</div>';
    html += '<div class="text-zh">' + escH(obj.zh) + '</div>';
    html += '</div>';
  }

  // PT
  if (showPt && obj.pt_verse) {
    html += '<div class="text-block">';
    html += '<div class="text-verse">' + escH(obj.pt_verse) + '</div>';
    if (obj.pt_commentary) {
      html += '<div class="text-commentary">' + escH(obj.pt_commentary) + '</div>';
    }
    html += '</div>';
  }

  // EN
  if (showEn && obj.en) {
    html += '<div class="text-block">';
    html += '<div class="text-en">' + escH(obj.en) + '</div>';
    html += '</div>';
  }

  // ZH mode: also show EN as reference
  if (LANG === 'zh' && obj.en) {
    if (html && obj.zh) html += '<div class="section-divider"></div>';
    html += '<div class="text-block">';
    html += '<div class="text-lang">EN — Legge</div>';
    html += '<div class="text-en">' + escH(obj.en) + '</div>';
    html += '</div>';
  }

  return html;
}

function buildLinesBlock(lines, movingLines) {
  var html = '';
  movingLines = movingLines || [];

  lines.forEach(function(line) {
    // Usa line.position (1-6 do corpus) para checar movingLines (índices 0-5)
    var isMoving = movingLines.indexOf(line.position - 1) >= 0;
    var headerPt = line.header_pt || ('Linha ' + line.position);
    var headerLabel = LANG === 'en'
      ? ('Line ' + line.position)
      : LANG === 'zh'
      ? ('第' + line.position + '爻')
      : headerPt;

    html += '<div class="line-item">';
    html += '<div class="line-header' + (isMoving ? ' is-moving' : '') + '">';
    html += escH(headerLabel);
    if (isMoving) html += ' <span class="line-moving-tag">' + escH(t('lineMoving')) + '</span>';
    html += '</div>';

    // ZH
    if (line.zh) {
      html += '<div class="text-zh" style="font-size:var(--text-label);margin-bottom:5px">' + escH(line.zh) + '</div>';
    }

    // PT
    if (LANG === 'pt' && line.pt_verse) {
      html += '<div class="text-verse">' + escH(line.pt_verse) + '</div>';
      if (line.pt_commentary) {
        html += '<div class="text-commentary">' + escH(line.pt_commentary) + '</div>';
      }
    }

    // EN
    if (LANG === 'en' && line.en) {
      html += '<div class="text-en">' + escH(line.en) + '</div>';
    }

    // ZH mode: also show EN
    if (LANG === 'zh' && line.en) {
      html += '<div class="section-divider"></div>';
      html += '<div class="text-lang">EN — Legge</div>';
      html += '<div class="text-en">' + escH(line.en) + '</div>';
    }

    html += '</div>';
    if (line.position < lines[lines.length - 1].position) html += '<div class="section-divider"></div>';
  });

  return html;
}

function buildSection(zhLabel, label, body, id, open) {
  return '<div class="section' + (open ? ' open' : '') + '" id="sec-' + id + '" data-section-id="' + id + '">' +
    '<div class="section-hd" role="button" tabindex="0" aria-expanded="' + (open ? 'true' : 'false') + '">' +
      '<div class="section-hd-left">' +
        '<span class="section-zh" aria-hidden="true">' + zhLabel + '</span>' +
        '<span class="section-lbl">' + escH(label) + '</span>' +
      '</div>' +
      '<span class="section-arrow" aria-hidden="true">▼</span>' +
    '</div>' +
    '<div class="section-body" role="region"><div>' + body + '</div></div>' +
  '</div>';
}

function buildTrigrams(hex) {
  var upper = getTrigram(hex.trigrams.u);
  var lower = getTrigram(hex.trigrams.l);
  if (!upper || !lower) return '';

  function trigName(trig) {
    if (LANG === 'zh') return trig.zh + ' ' + trig.pinyin;
    if (LANG === 'en') return trig.name_en;
    return trig.name_pt;
  }

  return '<div class="trigrams-row">' +
    '<div class="trig-chip">' +
      '<span class="trig-pos">' + escH(t('upperTrig')) + '</span>' +
      '<span class="trig-sep">·</span>' +
      '<span class="trig-sym">' + upper.symbol + '</span>' +
      '<span class="trig-name">' + escH(trigName(upper)) + '</span>' +
    '</div>' +
    '<div class="trig-chip">' +
      '<span class="trig-pos">' + escH(t('lowerTrig')) + '</span>' +
      '<span class="trig-sep">·</span>' +
      '<span class="trig-sym">' + lower.symbol + '</span>' +
      '<span class="trig-name">' + escH(trigName(lower)) + '</span>' +
    '</div>' +
  '</div>';
}

function buildHexHeader(hex) {
  var nameKey = LANG === 'zh' ? 'zh' : LANG === 'en' ? 'en' : 'pt';
  var hexName = hex.name[nameKey] || hex.name.en;
  return '<div class="hex-header">' +
    '<div class="hex-sym" id="hexSym-' + hex.number + '">' + hex.unicode + '</div>' +
    '<div class="hex-meta">' +
      '<div class="hex-num">' + escH(t('hexN')) + ' ' + hex.number + '</div>' +
      '<div class="hex-name-zh">' + escH(hex.name.zh) + '</div>' +
      '<div class="hex-name-py">' + escH(hex.name.pinyin) + '</div>' +
      '<div class="hex-name-tr">' + escH(hexName) + '</div>' +
      (hex.keywords ? '<div class="hex-keywords">' + escH(hex.keywords) + '</div>' : '') +
    '</div>' +
  '</div>';
}

function buildHexBody(hex, movingLines, isSecondary) {
  var q = isSecondary ? '' : (document.getElementById('questionInput').value || '').trim();
  var questionHtml = q ? '<div class="question-display">' + escH(q) + '</div>' : '';

  var trigHtml = buildTrigrams(hex);

  var movingHtml = '';
  if (movingLines && movingLines.length > 0) {
    var nums = movingLines.map(function(i) { return i + 1; }).join(', ');
    var msg = t('movingAlert').replace('%l', nums);
    movingHtml = '<div class="moving-alert"><span class="moving-alert-icon" aria-hidden="true">⟳</span><span>' + msg + '</span></div>';
  }

  // Only show lines section if primary (or if secondary with context)
  // For secondary hex: no moving lines, show judgment + image open, lines collapsed
  var linesToShow = isSecondary ? [] : movingLines;
  var showAllLines = isSecondary || (movingLines && movingLines.length === 0);

  // Lines: if there are moving lines, only show those lines; if none, show all
  var linesData = showAllLines
    ? hex.lines
    : hex.lines.filter(function(_, i) { return linesToShow.indexOf(i) >= 0; });

  var sections =
    buildSection('卦辭', t('secJudgment'), buildTextBlock(hex.judgment), 'judgment-' + hex.number, true) +
    buildSection('象傳', t('secImage'),    buildTextBlock(hex.image),    'image-' + hex.number,    false) +
    buildSection('爻辭', t('secLines'),    buildLinesBlock(linesData, movingLines), 'lines-' + hex.number, !isSecondary);

  return questionHtml + trigHtml + movingHtml + '<div class="sections">' + sections + '</div>';
}

/* ════════════════════════════════════════════════
   RENDER RESULT
════════════════════════════════════════════════ */
function renderResult(result) {
  var hex    = result.hex;
  var mutHex = result.mutHex;
  var movingLines = result.movingLines;

  // Hide empty state
  var emptyState = document.getElementById('emptyState');
  if (emptyState) emptyState.style.display = 'none';

  var html =
    '<div class="hex-card hex-card-reveal">' +
      buildHexHeader(hex) +
      buildHexBody(hex, movingLines, false) +
    '</div>';

  if (mutHex) {
    html +=
      '<div class="hex2-wrapper">' +
        '<div class="hex2-label">' + escH(t('mutantLabel')) + '</div>' +
        buildHexHeader(mutHex) +
        buildHexBody(mutHex, [], true) +
      '</div>';
  }

  document.getElementById('results').innerHTML = html;

  // Ritual: reveal hexagram symbol with delay
  setTimeout(function() {
    var sym = document.getElementById('hexSym-' + hex.number);
    if (sym) sym.classList.add('revealed');
  }, 80);
  if (mutHex) {
    setTimeout(function() {
      var sym2 = document.getElementById('hexSym-' + mutHex.number);
      if (sym2) sym2.classList.add('revealed');
    }, 350);
  }

  // Scroll to results on mobile
  if (window.innerWidth <= 780) {
    setTimeout(function() {
      document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  }
}

/* ════════════════════════════════════════════════
   CONSULTATION
════════════════════════════════════════════════ */
document.getElementById('consultBtn').addEventListener('click', function() {
  if (!CORPUS || IS_CONSULTING) return;
  IS_CONSULTING = true;

  var btn = document.getElementById('consultBtn');
  btn.disabled = true;
  btn.textContent = '…';

  // Clear previous result
  var resultsEl = document.getElementById('results');
  var emptyState = document.getElementById('emptyState');
  if (emptyState) emptyState.style.display = 'none';

  // Reset coin stage
  var coinStage = document.getElementById('coinStage');
  coinStage.classList.remove('visible');
  coinStage.innerHTML = '';

  // Generate result based on method
  if (METHOD === 'ritual') {

    /* ── PASSO 1: SORTEIO A→F ──────────────────────────
       lines[0]=A=linha1(base) ... lines[5]=F=linha6(topo)
       coins[i] = [c1,c2,c3] das moedas da linha i
       Trigrama inferior: lines[0..2] = A,B,C
       Trigrama superior: lines[3..5] = D,E,F
    ───────────────────────────────────────────────────── */
    var lines = [];
    var coins = [];
    for (var i = 0; i < 6; i++) {
      var c1 = tossCoin(), c2 = tossCoin(), c3 = tossCoin();
      coins.push([c1, c2, c3]);
      lines.push(lineValue(c1 + c2 + c3));
    }

    /* ── PASSO 4: RESULTADO ────────────────────────────
       movingLines: índices 0–5 das linhas móveis
       hexFromLines usa lines[0..2] como inferior
                        lines[3..5] como superior
       hexMutated inverte as linhas móveis e recalcula
    ───────────────────────────────────────────────────── */
    var movingLines = [];
    lines.forEach(function(l, i) { if (l.moving) movingLines.push(i); });

    var hexNum    = hexFromLines(lines);
    var mutHexNum = movingLines.length > 0 ? hexMutated(lines, movingLines) : null;
    var hex       = getHex(hexNum);
    var mutHex    = mutHexNum ? getHex(mutHexNum) : null;

    var result = { hex: hex, mutHex: mutHex, movingLines: movingLines };
    window._lastResult = result;

    /* ── PASSOS 2+3: ANIMAÇÃO → depois RENDERIZA ───── */
    animateCoins(lines, coins, function() {
      renderResult(result);
      btn.disabled = false;
      btn.innerHTML = t('consultBtn');
      IS_CONSULTING = false;
    });

  } else {
    // Direct: pick random hexagram, no coins, no moving lines
    var hexNum = secureRandInt(64) + 1;
    var hex = getHex(hexNum);
    var result = { hex: hex, mutHex: null, movingLines: [] };
    window._lastResult = result;

    renderResult(result);
    btn.disabled = false;
    btn.innerHTML = t('consultBtn');
    IS_CONSULTING = false;
  }
});

/* ════════════════════════════════════════════════
   ACCORDION — event delegation (no inline onclick)
════════════════════════════════════════════════ */
document.getElementById('results').addEventListener('click', function(e) {
  var hd = e.target.closest('.section-hd');
  if (!hd) return;
  var section = hd.closest('.section');
  if (!section) return;
  var isOpen = section.classList.toggle('open');
  hd.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
});

document.getElementById('results').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' || e.key === ' ') {
    var hd = e.target.closest('.section-hd');
    if (hd) { e.preventDefault(); hd.click(); }
  }
});

/* ════════════════════════════════════════════════
   METHOD TABS
════════════════════════════════════════════════ */
document.querySelectorAll('.method-tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    METHOD = this.getAttribute('data-method');
    document.querySelectorAll('.method-tab').forEach(function(t) { t.classList.remove('active'); });
    this.classList.add('active');
    updateMethodDesc();
    // Reset coin stage when switching
    var coinStage = document.getElementById('coinStage');
    coinStage.classList.remove('visible');
    coinStage.innerHTML = '';
  });
});

document.getElementById('langBtn').addEventListener('click', function(e) {
  e.stopPropagation();
  var wrap = document.getElementById('langWrap');
  var isOpen = wrap.classList.toggle('open');
  this.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
});

document.addEventListener('click', function() {
  var wrap = document.getElementById('langWrap');
  if (wrap.classList.contains('open')) {
    wrap.classList.remove('open');
    document.getElementById('langBtn').setAttribute('aria-expanded', 'false');
  }
});

document.getElementById('langMenu').addEventListener('click', function(e) {
  e.stopPropagation();
  var opt = e.target.closest('.lang-opt');
  if (!opt) return;
  applyLang(opt.getAttribute('data-lang'));
  document.getElementById('langWrap').classList.remove('open');
  document.getElementById('langBtn').setAttribute('aria-expanded', 'false');
});

   PWA — Service Worker + Install Banner
════════════════════════════════════════════════ */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').catch(function(err) {
      console.warn('SW registration failed:', err);
    });
  });
}

var deferredInstall = null;

window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredInstall = e;
  // Show banner after a small delay
  setTimeout(function() {
    var banner = document.getElementById('installBanner');
    if (banner) banner.classList.remove('hidden');
  }, 3000);
});

document.getElementById('installBtn').addEventListener('click', function() {
  if (!deferredInstall) return;
  deferredInstall.prompt();
  deferredInstall.userChoice.then(function() {
    deferredInstall = null;
    document.getElementById('installBanner').classList.add('hidden');
  });
});

document.getElementById('installDismiss').addEventListener('click', function() {
  document.getElementById('installBanner').classList.add('hidden');
  try { localStorage.setItem('64hex-install-dismissed', '1'); } catch(e) {}
});

window.addEventListener('appinstalled', function() {
  document.getElementById('installBanner').classList.add('hidden');
});

/* ════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', function() {
  // Restore saved theme
  var savedTheme = null;
  try { savedTheme = localStorage.getItem('64hex-theme'); } catch(e) {}
  applyTheme(savedTheme === 'light' ? 'light' : 'dark');

  // Restore saved lang
  var savedLang = null;
  try { savedLang = localStorage.getItem('64hex-lang'); } catch(e) {}
  applyLang(savedLang || 'pt');

  // Disable consult btn until corpus loads
  document.getElementById('consultBtn').disabled = true;

  // Show initial method description
  updateMethodDesc();

  // Load corpus
  loadCorpus();
});

// Save lang preference on change
var _origApplyLang = applyLang;
applyLang = function(l) {
  _origApplyLang(l);
  try { localStorage.setItem('64hex-lang', l); } catch(e) {}
};
